name: Deploy Mock Admin

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-mock-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-northeast-2
      S3_BUCKET: mock-admin-front-dev
      CLOUDFRONT_DISTRIBUTION_ID: E3V31IFVJZ8NY1
      VITE_API_URL: https://agent-api.green-ribbon.co.kr
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python for AWS CLI
        uses: actions/setup-python@v1
        with:
          python-version: "3.x"

      - name: Install AWS CLI
        run: pip3 install awscli --upgrade --user

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Set Yarn Version
        run: corepack prepare yarn@4.12.0 --activate

      - name: Cache Yarn Berry packages
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install

      - name: Build
        run: yarn build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Upload static assets
        run: |
          aws s3 sync dist/assets "s3://${S3_BUCKET}/assets" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload app files
        run: |
          aws s3 sync dist "s3://${S3_BUCKET}" \
            --delete \
            --exclude "assets/*" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
