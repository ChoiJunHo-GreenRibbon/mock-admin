name: Deploy Mock Admin

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-mock-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-northeast-2
      S3_BUCKET: mock-admin-front-dev
      CLOUDFRONT_DISTRIBUTION_ID: E3V31IFVJZ8NY1
      VITE_API_URL: https://agent-api.green-ribbon.co.kr
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::938617530895:role/github-action-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload static assets
        run: |
          aws s3 sync dist/assets "s3://${S3_BUCKET}/assets" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload app files
        run: |
          aws s3 sync dist "s3://${S3_BUCKET}" \
            --delete \
            --exclude "assets/*" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
